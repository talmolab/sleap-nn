# Codespell configuration is within pyproject.toml; the action below does
# not read pyproject.toml on its own, so the `ignore_words_list` input
# below must be kept in sync with [tool.codespell].ignore-words-list.
---
name: Codespell

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Annotate locations with typos
        uses: codespell-project/codespell-problem-matcher@v1
      - name: Codespell
        uses: codespell-project/actions-codespell@v2
        with:
          # Literal DRM device-node prefix (e.g. /dev/dri/renderD128); not a typo of "rendered".
          ignore_words_list: renderD